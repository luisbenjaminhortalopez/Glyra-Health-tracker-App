apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

/**
 * React Native Android app build configuration
 * Health Tracker App - Requisitos 11.1, 11.2
 */

react {
    // React Native Gradle Plugin configuration
    // Defaults are generally fine for most projects
    autolinkLibrariesWithApp()
}

def enableProguardInReleaseBuilds = false

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.healthtrackerapp"

    defaultConfig {
        applicationId "com.healthtrackerapp"
        minSdkVersion rootProject.ext.minSdkVersion       // 26 = Android 8.0
        targetSdkVersion rootProject.ext.targetSdkVersion  // 34
        versionCode 1
        versionName "1.0.0"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            // For release builds, generate a signing key:
            // keytool -genkeypair -v -storetype PKCS12 -keystore release.keystore \
            //   -alias health-tracker -keyalg RSA -keysize 2048 -validity 10000
            signingConfig signingConfigs.debug  // Use debug key for now
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
    implementation platform('com.google.firebase:firebase-bom:34.12.0')
    implementation 'com.google.firebase:firebase-analytics'
}
apply plugin: 'com.google.gms.google-services'

